# uHorse AI Gateway 配置示例

[server]
# 服务监听地址
host = "0.0.0.0"
# 服务监听端口
port = 8080
# 最大连接数
max_connections = 1000
# WebSocket 超时时间（秒）
websocket_timeout = 300

[database]
# SQLite 数据库路径
path = "./data/uhorse.db"
# 连接池大小
pool_size = 10

[channels]
# 启用的通道
enabled = ["telegram"]

# Telegram 配置
[channels.telegram]
# 从环境变量读取: TELEGRAM_BOT_TOKEN
bot_token = "${TELEGRAM_BOT_TOKEN}"
# Webhook URL（可选）
webhook_url = "/webhook/telegram"

[security]
# JWT 密钥（从环境变量读取）
jwt_secret = "${JWT_SECRET:your-secret-key-change-this}"
# 令牌过期时间（秒）
token_expiry = 86400
# 是否需要设备配对
device_pairing_required = false
# 幂等性 TTL（秒）
idempotency_ttl = 3600

[scheduler]
# 是否启用调度器
enabled = true
# 最大并发任务数
max_concurrent_jobs = 10
# 任务超时时间（秒）
job_timeout = 300

[observability]
# 日志级别: trace, debug, info, warn, error
log_level = "info"
# 是否启用 tracing
tracing_enabled = false
# tracing 端点（可选）
# tracing_endpoint = "http://jaeger:4318"
# 是否启用 metrics
metrics_enabled = false
# metrics 端口
# metrics_port = 9090

[plugins]
# 插件目录
plugin_dir = "./plugins"
# 进程插件超时（秒）
process_timeout = 30
# 是否启用 WASM 插件
wasm_enabled = false
