version: '3.8'

services:
  uhorse:
    build:
      context: .
      dockerfile: Dockerfile
    image: uhorse:latest
    container_name: uhorse
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP API
      - "9090:9090"  # Metrics
    environment:
      - RUST_LOG=info
      - UHORSE_SERVER_HOST=0.0.0.0
      - UHORSE_SERVER_PORT=8080
      - UHORSE_DATABASE_PATH=/app/data/uhorse.db
      - UHORSE_LOG_LEVEL=info
      # 安全配置（生产环境应使用密钥管理）
      - UHORSE_JWT_SECRET=dev-secret-change-in-production
      - UHORSE_TOKEN_EXPIRY=86400
    volumes:
      - uhorse_data:/app/data
      - uhorse_logs:/app/logs
      - ./config.toml:/app/config/config.toml:ro
    networks:
      - uhorse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # PostgreSQL（可选，用于生产环境）
  postgres:
    image: postgres:16-alpine
    container_name: uhorse_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=uhorse
      - POSTGRES_USER=uhorse
      - POSTGRES_PASSWORD=uhorse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uhorse_network
    ports:
      - "5432:5432"

  # Redis（可选，用于缓存和会话存储）
  redis:
    image: redis:7-alpine
    container_name: uhorse_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - uhorse_network
    ports:
      - "6379:6379"

  # Prometheus（监控）
  prometheus:
    image: prom/prometheus:latest
    container_name: uhorse_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - uhorse_network

  # Grafana（可视化）
  grafana:
    image: grafana/grafana:latest
    container_name: uhorse_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=uhorse
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - uhorse_network
    depends_on:
      - prometheus

volumes:
  uhorse_data:
    driver: local
  uhorse_logs:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  uhorse_network:
    driver: bridge
