name: Daily Build

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== 检查是否有变更 ====================
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
      commit_message: ${{ steps.check.outputs.commit_message }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes since last daily build
        id: check
        run: |
          # 获取当前 HEAD 的 commit SHA
          CURRENT_SHA=$(git rev-parse HEAD)
          CURRENT_MSG=$(git log -1 --pretty=%s HEAD)

          echo "commit_sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT
          echo "commit_message=${CURRENT_MSG}" >> $GITHUB_OUTPUT

          # 查找最后一次成功的每日构建
          LAST_BUILD_SHA=$(gh api repos/${{ github.repository }}/actions/workflows/daily-build.yml/runs \
            --jq '.workflow_runs | map(select(.status == "completed" and .conclusion == "success")) | .[0].head_sha' 2>/dev/null || echo "")

          if [ -z "$LAST_BUILD_SHA" ]; then
            # 没有找到之前的构建，需要构建
            echo "No previous daily build found, will build"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_SHA" = "$LAST_BUILD_SHA" ]; then
            # 相同的 commit，不需要构建
            echo "No changes since last daily build (${CURRENT_SHA:0:7})"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # 有新的 commit，需要构建
            COMMITS_SINCE=$(git rev-list ${LAST_BUILD_SHA}..HEAD --count)
            echo "Found ${COMMITS_SINCE} new commits since last build"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 每日构建 ====================
  build:
    name: Build ${{ matrix.target }}
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # Linux ARM64 - temporarily disabled
          # - target: aarch64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install protoc --yes

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis --yes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/node-desktop-web/package-lock.json

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Hub
        run: cargo build --release --target ${{ matrix.target }} -p uhorse-hub

      - name: Package Node Desktop
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          UHORSE_VERSION: nightly-${{ steps.date.outputs.date }}
        run: ./scripts/package-node-desktop.sh

      - name: Package Node Desktop macOS installer
        if: runner.os == 'macOS'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          UHORSE_VERSION: nightly-${{ steps.date.outputs.date }}
        run: ./scripts/package-node-desktop-macos-pkg.sh

      - name: Smoke test Node Desktop installed layout (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          UHORSE_VERSION: nightly-${{ steps.date.outputs.date }}
        run: ./scripts/desktop-installer-smoke.sh "target/node-desktop-package/uhorse-node-desktop-${UHORSE_VERSION}-${TARGET}"

      - name: Package Node Desktop Windows installer
        if: runner.os == 'Windows'
        shell: powershell
        env:
          TARGET: ${{ matrix.target }}
          UHORSE_VERSION: nightly-${{ steps.date.outputs.date }}
        run: ./scripts/package-node-desktop-windows-installer.ps1

      - name: Smoke test Node Desktop installed layout (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          TARGET: ${{ matrix.target }}
          UHORSE_VERSION: nightly-${{ steps.date.outputs.date }}
        run: ./scripts/desktop-installer-smoke.ps1 -InstallRoot "target/node-desktop-package/uhorse-node-desktop-${env:UHORSE_VERSION}-${env:TARGET}"

      - name: Prepare Hub binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          strip uhorse-hub 2>/dev/null || true
          chmod +x uhorse-hub

      - name: Create Hub archive (Unix)
        if: runner.os != 'Windows'
        run: |
          DATE="${{ steps.date.outputs.date }}"
          ARCHIVE_NAME="uhorse-hub-nightly-${DATE}-${{ matrix.target }}"

          rm -rf package && mkdir -p package
          cp target/${{ matrix.target }}/release/uhorse-hub package/
          cp README.md package/ 2>/dev/null || true
          cp LICENSE* package/ 2>/dev/null || true

          tar -czvf ${ARCHIVE_NAME}.tar.gz -C package .

      - name: Create Hub archive (Windows)
        if: runner.os == 'Windows'
        run: |
          $DATE = "${{ steps.date.outputs.date }}"
          $ARCHIVE_NAME = "uhorse-hub-nightly-${DATE}-${{ matrix.target }}"

          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path package -Force
          Copy-Item target/${{ matrix.target }}/release/uhorse-hub.exe package/
          Copy-Item README.md package/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* package/ -ErrorAction SilentlyContinue

          Compress-Archive -Path package/* -DestinationPath "${ARCHIVE_NAME}.zip"

      - name: Upload Hub artifact
        uses: actions/upload-artifact@v7
        with:
          name: uhorse-hub-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/uhorse-hub-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}.*

      - name: Upload Node Desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: uhorse-node-desktop-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/target/node-desktop-package/uhorse-node-desktop-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}.*
            ${{ github.workspace }}/target/node-desktop-package/uhorse-node-desktop-nightly-${{ steps.date.outputs.date }}-${{ matrix.target }}-installer.exe

  # ==================== 更新 Nightly Release ====================
  nightly-release:
    name: Update Nightly Release
    needs: [check-changes, build]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: uhorse-*-nightly-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.pkg" -o -name "*-installer.exe" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Get date
        id: date
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "display_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Delete old nightly release
        run: |
          # 删除旧的 nightly tag 和 release
          gh release delete nightly --yes 2>/dev/null || true
          git push origin --delete refs/tags/nightly 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: uHorse Nightly (${{ steps.date.outputs.display_date }})
          body: |
            ## 每日构建 (Nightly Build)

            **构建日期**: ${{ steps.date.outputs.display_date }}
            **Commit**: ${{ needs.check-changes.outputs.commit_sha }}
            **消息**: ${{ needs.check-changes.outputs.commit_message }}

            > ⚠️ 这是开发版本，可能不稳定。生产环境请使用正式发布版本。

            ### 变更内容
            查看 [commit 历史](https://github.com/${{ github.repository }}/commits/main) 获取详细信息。
          prerelease: true
          draft: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🌙 Nightly Build Updated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 属性 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **日期** | ${{ steps.date.outputs.display_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ needs.check-changes.outputs.commit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Nightly 产物包含：uhorse-hub 与 uhorse-node-desktop。" >> $GITHUB_STEP_SUMMARY
          echo "📥 下载: https://github.com/${{ github.repository }}/releases/tag/nightly" >> $GITHUB_STEP_SUMMARY

  # ==================== 无变更时跳过 ====================
  skip-notify:
    name: Skip Notification
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip reason
        run: |
          echo "## ⏭️ 每日构建已跳过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "主干分支自上次构建以来没有新的变更。" >> $GITHUB_STEP_SUMMARY
