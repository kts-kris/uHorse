name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== 检查 ====================
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-
            ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --workspace

  # ==================== 测试 ====================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Run Agent Loop smoke
        run: |
          cargo test -p uhorse-hub test_reply_task_result_records_compaction_and_retries_once -- --nocapture
          cargo test -p uhorse-hub test_approval_request_records_wait_metric_and_transcript -- --nocapture
          cargo test -p uhorse-hub test_approve_approval_appends_transcript_event_for_bound_turn -- --nocapture
          cargo test -p uhorse-observability test_metrics_exporter_returns_prometheus_payload -- --nocapture
          cargo test -p uhorse-backup test_restore_lifecycle_records_audit_events -- --nocapture

      - name: Run audit smoke
        run: |
          cargo test -p uhorse-hub test_approval_decision_records_audit_events -- --nocapture
          cargo test -p uhorse-node-runtime test_dangerous_git_command_records_audit_event -- --nocapture
          cargo test -p uhorse-node-runtime test_checkpoint_and_restore_record_audit_events -- --nocapture
          cargo test -p uhorse-backup test_restore_lifecycle_records_audit_events -- --nocapture

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/node-desktop-web/package-lock.json

      - name: Build Node Desktop Web
        run: npm --prefix apps/node-desktop-web ci && npm --prefix apps/node-desktop-web run build

      - name: Build release binaries
        run: cargo build --release -p uhorse-hub -p uhorse-node-desktop

      - name: Run Node Desktop smoke
        run: ./scripts/desktop-smoke.sh

  # ==================== 代码检查 ====================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D clippy::all -A clippy::missing_docs_in_private_items -W warnings

  # ==================== 文档检查 ====================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Build documentation
        run: cargo doc --no-deps --workspace

  # ==================== 安全审计 ====================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
