name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # 匹配 v1.0.0, v1.0.0-beta.1, v1.0.0-rc.1 等
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0, 1.0.0-beta.1)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== 版本解析 ====================
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：使用输入的版本号
            VERSION="${{ github.event.inputs.version }}"
          else
            # Tag 触发：从 tag 解析版本号
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi

          # 移除可能存在的 v 前缀
          VERSION="${VERSION#v}"

          # 检测是否为预发布版本 (包含 -alpha, -beta, -rc 等)
          if [[ "$VERSION" =~ -(alpha|beta|rc|pre|dev|test)\.?[0-9]*$ ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          # 生成 tag
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          echo "::notice title=版本::${VERSION}"
          echo "::notice title=预发布::${PRERELEASE}"
          echo "::notice title=Tag::${TAG}"

  # ==================== 构建多平台二进制 ====================
  build:
    needs: resolve-version
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --yes

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build Hub
        run: cargo build --release --target ${{ matrix.target }} -p uhorse-hub

      - name: Build Node
        run: cargo build --release --target ${{ matrix.target }} -p uhorse-node

      - name: Build Node Desktop
        run: cargo build --release --target ${{ matrix.target }} -p uhorse-node-desktop

      - name: Prepare binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          strip uhorse-hub uhorse-node uhorse-node-desktop 2>/dev/null || true
          chmod +x uhorse-hub uhorse-node uhorse-node-desktop

      - name: Create Hub archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ARCHIVE_NAME="uhorse-hub-${VERSION}-${{ matrix.target }}"

          rm -rf package && mkdir -p package
          cp target/${{ matrix.target }}/release/uhorse-hub package/
          cp README.md package/ 2>/dev/null || true
          cp CHANGELOG.md package/ 2>/dev/null || true
          cp LICENSE* package/ 2>/dev/null || true

          tar -czvf ${ARCHIVE_NAME}.tar.gz -C package .
          echo "hub_archive=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Create Node archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ARCHIVE_NAME="uhorse-node-${VERSION}-${{ matrix.target }}"

          rm -rf package && mkdir -p package
          cp target/${{ matrix.target }}/release/uhorse-node package/
          cp README.md package/ 2>/dev/null || true
          cp CHANGELOG.md package/ 2>/dev/null || true
          cp LICENSE* package/ 2>/dev/null || true

          tar -czvf ${ARCHIVE_NAME}.tar.gz -C package .
          echo "node_archive=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Create Node Desktop archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          ARCHIVE_NAME="uhorse-node-desktop-${VERSION}-${{ matrix.target }}"

          rm -rf package && mkdir -p package
          cp target/${{ matrix.target }}/release/uhorse-node-desktop package/
          cp README.md package/ 2>/dev/null || true
          cp CHANGELOG.md package/ 2>/dev/null || true
          cp LICENSE* package/ 2>/dev/null || true

          tar -czvf ${ARCHIVE_NAME}.tar.gz -C package .
          echo "node_desktop_archive=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Create Hub archive (Windows)
        if: runner.os == 'Windows'
        run: |
          $VERSION = "${{ needs.resolve-version.outputs.version }}"
          $ARCHIVE_NAME = "uhorse-hub-${VERSION}-${{ matrix.target }}"

          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path package -Force
          Copy-Item target/${{ matrix.target }}/release/uhorse-hub.exe package/
          Copy-Item README.md package/ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md package/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* package/ -ErrorAction SilentlyContinue

          Compress-Archive -Path package/* -DestinationPath "${ARCHIVE_NAME}.zip"
          echo "hub_archive=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Create Node archive (Windows)
        if: runner.os == 'Windows'
        run: |
          $VERSION = "${{ needs.resolve-version.outputs.version }}"
          $ARCHIVE_NAME = "uhorse-node-${VERSION}-${{ matrix.target }}"

          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path package -Force
          Copy-Item target/${{ matrix.target }}/release/uhorse-node.exe package/
          Copy-Item README.md package/ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md package/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* package/ -ErrorAction SilentlyContinue

          Compress-Archive -Path package/* -DestinationPath "${ARCHIVE_NAME}.zip"
          echo "node_archive=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Create Node Desktop archive (Windows)
        if: runner.os == 'Windows'
        run: |
          $VERSION = "${{ needs.resolve-version.outputs.version }}"
          $ARCHIVE_NAME = "uhorse-node-desktop-${VERSION}-${{ matrix.target }}"

          Remove-Item package -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path package -Force
          Copy-Item target/${{ matrix.target }}/release/uhorse-node-desktop.exe package/
          Copy-Item README.md package/ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md package/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* package/ -ErrorAction SilentlyContinue

          Compress-Archive -Path package/* -DestinationPath "${ARCHIVE_NAME}.zip"
          echo "node_desktop_archive=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Upload Hub artifact
        uses: actions/upload-artifact@v4
        with:
          name: uhorse-hub-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/uhorse-hub-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.*

      - name: Upload Node artifact
        uses: actions/upload-artifact@v4
        with:
          name: uhorse-node-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/uhorse-node-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.*

      - name: Upload Node Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: uhorse-node-desktop-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/uhorse-node-desktop-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.*

  # ==================== 发布到 GitHub Releases ====================
  release:
    name: Create Release
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: find artifacts -type f -ls

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"

          # 尝试从 CHANGELOG.md 提取
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d')
          fi

          # 如果没有 CHANGELOG.md 或未找到，从 git log 生成
          if [ -z "$CHANGELOG" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

            echo "## What's Changed" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md

            if [ -n "$PREV_TAG" ]; then
              echo "### Commits since $PREV_TAG" >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> /tmp/changelog.md
            else
              echo "### Initial Release" >> /tmp/changelog.md
              echo "" >> /tmp/changelog.md
              git log --pretty=format:"- %s (%h)" --no-merges -20 >> /tmp/changelog.md
            fi

            CHANGELOG=$(cat /tmp/changelog.md)
          fi

          {
            echo 'content<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create tag if missing (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists, skip creating it."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${{ needs.resolve-version.outputs.version }}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: uHorse ${{ needs.resolve-version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ needs.resolve-version.outputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 属性 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | ${{ needs.resolve-version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ needs.resolve-version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **预发布** | ${{ needs.resolve-version.outputs.prerelease }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 发布文件" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la release-assets/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ==================== 发布到 crates.io ====================
  publish-crate:
    name: Publish to crates.io
    needs: [resolve-version, release]
    runs-on: ubuntu-latest
    if: needs.resolve-version.outputs.prerelease != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true

  # ==================== Docker 镜像 ====================
  docker:
    name: Build Docker Image
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    continue-on-error: true  # Docker 发布可选
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/uhorse
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.resolve-version.outputs.version }},enable=${{ !startsWith(needs.resolve-version.outputs.version, '0.') }}
            type=raw,value=latest,enable=${{ needs.resolve-version.outputs.prerelease != 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}
