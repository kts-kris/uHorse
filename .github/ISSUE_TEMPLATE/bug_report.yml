name: 🐛 Bug Report
description: 报告一个 bug 帮助我们改进 uHorse
title: "[Bug] "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告这个 bug！请填写以下信息帮助我们定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰描述你遇到的问题
      placeholder: "当我执行...时，发生了..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供复现问题的步骤
      placeholder: |
        1. 配置 '...'
        2. 运行 '...'
        3. 发送消息 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: uHorse 版本
      description: 你使用的 uHorse 版本
      placeholder: "v1.0.0 或 commit hash"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust 版本
      description: 运行 `rustc --version` 的输出
      placeholder: "rustc 1.75.0"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Linux
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴相关的日志输出（如果有敏感信息请脱敏）
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: 配置文件
      description: 请粘贴相关的配置（如果有敏感信息请脱敏）
      render: toml
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 任何其他可能有助于解决问题的信息
    validations:
      required: false
