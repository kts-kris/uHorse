apiVersion: v1
kind: ConfigMap
metadata:
  name: uhorse-config
  namespace: default
data:
  config.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    max_connections = 1000
    request_timeout = 30
    read_timeout = 10
    write_timeout = 10

    [server.health]
    enabled = true
    path = "/health"
    verbose = false

    [database]
    path = "/app/data/uhorse.db"
    pool_size = 10
    conn_timeout = 30
    wal_enabled = true
    fk_enabled = true

    [logging]
    level = "info"
    format = "json"
    ansi = false

    [observability]
    service_name = "uhorse"
    tracing_enabled = true
    metrics_enabled = true
    metrics_port = 9090

    [scheduler]
    enabled = true
    threads = 2
    max_concurrent_jobs = 100

    [tools]
    sandbox_enabled = true
    sandbox_timeout = 30
    sandbox_max_memory = 512
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uhorse-env
  namespace: default
data:
  RUST_LOG: "info"
  OPENCLAW_CONFIG: "/app/config/config.toml"
  OPENCLAW_DATA_DIR: "/app/data"
  OPENCLAW_LOG_DIR: "/app/logs"
