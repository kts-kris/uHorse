apiVersion: v1
kind: Secret
metadata:
  name: uhorse-secrets
  namespace: default
type: Opaque
stringData:
  # JWT 密钥（生产环境必须更改）
  jwt_secret: "CHANGE_ME_IN_PRODUCTION_USE_32_CHAR_RANDOM_STRING"

  # Telegram Bot Token
  telegram_bot_token: ""

  # Slack 配置
  slack_bot_token: ""
  slack_signing_secret: ""

  # Discord 配置
  discord_bot_token: ""
  discord_application_id: ""

  # WhatsApp 配置
  whatsapp_access_token: ""
  whatsapp_phone_number_id: ""
  whatsapp_business_account_id: ""
  whatsapp_webhook_verify_token: ""
---
# 使用说明：
# 1. 生成 JWT 密钥: openssl rand -hex 32
# 2. 应用 Secret: kubectl apply -f secret.yaml
# 3. 更新特定密钥: kubectl patch secret uhorse-secrets -p '{"stringData":{"telegram_bot_token":"YOUR_TOKEN"}}'
