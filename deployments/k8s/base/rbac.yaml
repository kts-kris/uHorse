apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw
  namespace: default
roleRef:
  kind: Role
  name: openclaw
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: openclaw
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-scraper
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-openclaw
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-openclaw
roleRef:
  kind: ClusterRole
  name: prometheus-openclaw
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
  - kind: ServiceAccount
    name: prometheus-kube-state-metrics
    namespace: monitoring
  - kind: ServiceAccount
    name: prometheus-k8s
    namespace: monitoring
