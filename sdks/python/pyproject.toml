[project]
name = "uhorse-sdk"
version = "0.1.0"
description = "Python SDK for uHorse AI Gateway"
authors = [{name = "uHorse Contributors"}]
license = {text = "MIT OR Apache-2.0"}
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
